version: 2

sources:
  - name: stripe
    description: "Stripe API data landed in the bronze layer by the ingestion tool."
    database: "{{ var('raw_database', 'RAW_RETAIL') }}"
    schema: STRIPE
    meta:
      owner: analytics_engineering
      source_system: stripe
      classification: bronze
    # Note: Stripe stores amounts in integer cents; staging converts to decimal via / 100.
    # Stripe uses Unix epoch for timestamps; ingestion tools convert these to TIMESTAMP.
    # Filter to livemode = true — test charges are excluded in staging.

    tables:
      - name: charges
        description: "Payment charge events. Primary source for Stripe-originated revenue and payment-method reconciliation."
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: created
        columns:
          - name: id
            description: "Stripe charge ID."
            tests:
              - not_null
              - unique
          - name: created
            description: "Unix timestamp (converted to TIMESTAMP by ingestion tool) when the charge was created."
            tests:
              - not_null
          - name: amount
            description: "Charge amount in the smallest currency unit (cents for USD)."
            tests:
              - not_null
          - name: currency
            description: "ISO 4217 lowercase currency code. Staging normalizes to uppercase."
            tests:
              - not_null
          - name: status
            description: "Charge outcome: succeeded, pending, failed."
            tests:
              - not_null
              - accepted_values:
                  values:
                    - succeeded
                    - pending
                    - failed
          - name: livemode
            description: "TRUE for live charges; FALSE for test mode. Staging filters to livemode = true."
            tests:
              - not_null

      - name: customers
        description: "Stripe customer profiles. Cross-referenced with dim_customer via email match."
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: created
        columns:
          - name: id
            description: "Stripe customer ID."
            tests:
              - not_null
              - unique
          - name: created
            tests:
              - not_null

      - name: refunds
        description: "Refund events. Combined with disputes into fact_refunds (is_chargeback = false)."
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: created
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: charge
            description: "FK to charges.id."
            tests:
              - not_null
          - name: amount
            description: "Refund amount in cents."
            tests:
              - not_null
          - name: created
            tests:
              - not_null

      - name: disputes
        description: "Chargeback events. Combined with refunds into fact_refunds (is_chargeback = true)."
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: created
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: charge
            description: "FK to charges.id."
            tests:
              - not_null
          - name: amount
            description: "Disputed amount in cents."
            tests:
              - not_null
          - name: created
            tests:
              - not_null

      - name: payment_methods
        description: "Stored payment method details. Primary source for dim_payment_method."
        freshness:
          warn_after: {count: 48, period: hour}
          error_after: {count: 168, period: hour}
        loaded_at_field: created
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: type
            description: "Payment method type: card, klarna, affirm, etc."
            tests:
              - not_null
