# =============================================================================
# spark_retail_pack — Package Dependencies
# =============================================================================
# All versions pinned per Section 4 Part 3 §4.48 (canonical list).
# Update via: dbt deps && dbt parse && dbt test
# Bump versions through a PR with a tested upgrade.
# =============================================================================

packages:
  # dbt-utils — utility macros (surrogate keys, date spine, etc.)
  - package: dbt-labs/dbt_utils
    version: 1.3.0

  # dbt-codegen — accelerates source.yml and staging model creation
  - package: dbt-labs/codegen
    version: 0.13.1

  # dbt-date — date dimension helpers (used in dim_date generation)
  # Renamed from calogica/dbt_date to godatadriven/dbt_date
  - package: godatadriven/dbt_date
    version: 0.10.1

  # dbt-external-tables — Snowflake external table helpers
  - package: dbt-labs/dbt_external_tables
    version: 0.10.1

  # Note: dbt-labs/metrics is NOT included — MetricFlow is built into
  # dbt Core 1.6+. Semantic layer models live in 03_dbt_pro/models/semantic/.
