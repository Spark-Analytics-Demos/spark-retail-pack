# =============================================================================
# spark_retail_pack — OSS Core dbt Project
# =============================================================================
# This is the open-source core of the Spark Retail Pack.
# See ../01_design_docs/ for the full design document.
# See ../CLAUDE.md for project-wide conventions.
# =============================================================================

name: 'spark_retail_pack'
version: '0.1.0'   # Pre-release; bumps to 1.0.0 at v1 ship
config-version: 2

# This profile is read from profiles.yml at the user's ~/.dbt/profiles.yml
# or at the project root. See profiles.yml.template for the structure.
profile: 'spark_retail_pack'

# -----------------------------------------------------------------------------
# Project paths (defaults, kept explicit for clarity)
# -----------------------------------------------------------------------------
model-paths:    ["models"]
seed-paths:     ["seeds"]
test-paths:     ["tests"]
analysis-paths: ["analyses"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]
docs-paths:     ["docs"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

# -----------------------------------------------------------------------------
# dbt version compatibility
# Per Section 4 Part 3 §4.48: pinned dependencies
# -----------------------------------------------------------------------------
require-dbt-version: [">=1.7.0", "<2.0.0"]

# -----------------------------------------------------------------------------
# Project-level variables
# These can be overridden per environment or per-run via --vars
# -----------------------------------------------------------------------------
vars:
  # Reporting currency for all monetary values (Section 4 Part 1 §4.11)
  reporting_currency: 'USD'

  # Source (bronze) database where the ingestion tool lands raw data.
  # Production default: RAW_RETAIL (Fivetran/Airbyte target).
  # Override for dev/demo: --vars '{"raw_database": "ANALYTICS_RETAIL_STAGING"}'
  # or set in profiles.yml target vars block.
  raw_database: 'RAW_RETAIL'

  # Reporting timezone for date/time conversions (Section 4 Part 1 §4.7)
  # Locked: Africa/Nairobi (EAT, UTC+3, no DST) — see PHASE_0_DECISIONS.md §3
  reporting_timezone: 'Africa/Nairobi'

  # PII masking — toggle off only in dev with synthetic data (Section 8.5)
  pii_masking_enabled: true
  pii_hashing_method: 'sha256'
  # The salt comes from an env var; never hardcoded
  pii_hash_salt: "{{ env_var('PII_HASH_SALT', '') }}"

  # Incremental lookback window (Section 4 Part 3 §4.35)
  # Default 14 days catches order edits, refund updates, late-arriving data
  incremental_lookback_days: 14

  # Cancelled-order handling (Section 4 Part 2, fact_orders)
  # Standard analytical contexts exclude cancelled orders
  exclude_cancelled_orders: true

  # Earliest data we want to load (filters out historical noise per Section 6.4)
  min_order_date: '2020-01-01'

  # Demo/test only: when true, the point-in-time snapshot facts (fact_customer_state_daily,
  # fact_inventory_snapshot) emit a month-end snapshot for every month in the order history
  # so dashboard trend lines — and the small-tier KPI assertions calibrated to them — work.
  # Auto-enabled on the demo (staging) and CI targets; prod/dev stay today-only. Renders as a
  # quoted string 'True'/'False' (YAML can't take unquoted Jinja braces); the snapshot facts
  # normalise it to a real boolean before use.
  backfill_snapshots: "{{ target.name in ['staging', 'ci', 'smoke'] }}"

  # Demo/test only: build fact_inventory_snapshot from the daily inventory history feed
  # (stg_shopify__inventory_snapshots) — one real snapshot per day — so the Inventory Health
  # dashboard has genuine daily trends. Auto-enabled on staging + CI; prod/dev stay today-only
  # (real Shopify exposes only current levels).
  use_daily_snapshot_history: "{{ target.name in ['staging', 'ci', 'smoke'] }}"

# -----------------------------------------------------------------------------
# Model configurations
# Materialization defaults per Section 4 Part 3 §4.32
# -----------------------------------------------------------------------------
models:
  spark_retail_pack:
    # Default: views unless overridden below
    +materialized: view

    # Staging — views; one schema per source for clarity
    staging:
      +materialized: view
      +schema: staging
      shopify:
        +tags: ['staging', 'shopify']
      stripe:
        +tags: ['staging', 'stripe']
      ga4:
        +tags: ['staging', 'ga4']
      meta_ads:
        +tags: ['staging', 'meta_ads']
      klaviyo:
        +tags: ['staging', 'klaviyo']

    # Intermediate — ephemeral or views (not user-facing)
    intermediate:
      +materialized: ephemeral
      +schema: intermediate
      +tags: ['intermediate']

    # Core — gold layer (dimensions and facts)
    core:
      +schema: gold
      +tags: ['core']
      dimensions:
        +materialized: table
        +tags: ['core', 'dimensions']
      facts:
        +materialized: incremental
        +on_schema_change: 'append_new_columns'
        +tags: ['core', 'facts']

    # Marts — module-specific, materialized as tables
    marts:
      +materialized: table
      +tags: ['marts']
      sales:
        +schema: mart_sales
        +tags: ['marts', 'sales']
      customer:
        +schema: mart_customer
        +tags: ['marts', 'customer']
      inventory:
        +schema: mart_inventory
        +tags: ['marts', 'inventory']
# -----------------------------------------------------------------------------
# Seed configurations
# Seeds for source mappings, channel mappings, etc.
# -----------------------------------------------------------------------------
seeds:
  spark_retail_pack:
    +schema: seeds
    +quote_columns: false
    # Reference data seeds — rebuilt on schema change or data refresh
    fx_rates:
      +tags: ['seeds', 'reference_data', 'currency']
    geography_data:
      +tags: ['seeds', 'reference_data', 'geography']
    channel_mapping:
      +tags: ['seeds', 'reference_data', 'channels']
    product_category_mapping:
      +tags: ['seeds', 'reference_data', 'products']
    holidays:
      +tags: ['seeds', 'reference_data', 'dates']
    # Privacy seed — restrict schema access to RETAIL_ADMIN in production
    erasure_requests:
      +tags: ['seeds', 'privacy']

# -----------------------------------------------------------------------------
# Snapshot configurations
# SCD2 snapshots per Section 4 Part 3 §4.34
# -----------------------------------------------------------------------------
snapshots:
  spark_retail_pack:
    +target_schema: snapshots
    +tags: ['snapshots']

# -----------------------------------------------------------------------------
# Test configurations (dbt 1.8+: key renamed from 'tests' to 'data_tests')
# -----------------------------------------------------------------------------
data_tests:
  +severity: error
  +store_failures: true
  +store_failures_as: table
  +schema: quarantine   # Failed test rows quarantined for review

# -----------------------------------------------------------------------------
# Query tags (Snowflake-specific; helpful for cost monitoring)
# Uncomment once the query_comment macro is implemented (Phase 1)
# -----------------------------------------------------------------------------
