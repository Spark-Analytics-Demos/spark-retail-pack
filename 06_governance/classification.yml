# Column-level data classification — Spark Retail Pack
# Per §8.4: every column in the canonical core is classified into one of five tiers.
# Classification drives masking behaviour, access control, and audit-log routing.
#
# Taxonomy:
#   public       — no restriction; safe to expose anywhere
#   internal     — business-confidential but not personal
#   confidential — sensitive business data; financial impact if exposed
#   restricted   — highly sensitive; legal/regulatory impact (rarely used in v1)
#   pii          — personally identifiable; regulatory protection required (masked by default)
#
# This file is read by:
#   - The Data Operations dashboard (governance posture view)
#   - CI checks that flag unclassified new columns before merge
#   - The dbt docs site (classification badge per column)

version: 1

taxonomy:
  public:
    description: No restriction; safe to expose in public-facing dashboards, dbt docs, or external reports.
    masking_default: none
    access: all_warehouse_readers
  internal:
    description: Business-confidential but not personal. Safe for internal analytics and BI tools.
    masking_default: none
    access: all_warehouse_readers
  confidential:
    description: Sensitive business data with financial impact if exposed (costs, margins, ad spend).
    masking_default: none
    access: retail_finance_viewer_role_required
  restricted:
    description: Highly sensitive with legal/regulatory impact. Not stored in v1 (no card data, no tax IDs).
    masking_default: hash
    access: privileged_role_plus_audit_log
  pii:
    description: Personally identifiable; regulatory protection required (GDPR, CCPA).
    masking_default: sha256_hash
    access: retail_pii_viewer_role_required_plus_audit_log

# ─── Column classifications by table ─────────────────────────────────────────

tables:

  # ─── dim_customer ─────────────────────────────────────────────────────────

  - table: dim_customer
    domain: customer
    columns:
      - name: customer_sk
        classification: internal
      - name: customer_id
        classification: internal
        note: Shopify customer ID; not directly PII after hashing of contact fields
      - name: email
        classification: pii
        pii_category: contact_information
        masking_method: sha256_hash
      - name: email_hash
        classification: internal
        note: SHA-256 hash of email; used for joins; not plaintext PII
      - name: phone
        classification: pii
        pii_category: contact_information
        masking_method: sha256_hash_after_e164_normalise
      - name: phone_hash
        classification: internal
      - name: first_name
        classification: pii
        pii_category: name
        masking_method: sha256_hash
      - name: last_name
