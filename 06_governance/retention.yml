# Data retention policies — Spark Retail Pack
# Per §8.9: different data types have different retention horizons.
# These are the v1 defaults. Clients adjust per regulatory and operational needs.
#
# Layers:
#   bronze  — raw data in RAW_RETAIL (Fivetran/Airbyte landing zone)
#   silver  — intermediate and core models in ANALYTICS_RETAIL
#   gold    — mart and semantic layer models in ANALYTICS_RETAIL
#   archive — downsampled historical data (monthly grain beyond retention window)
#
# Snowflake-native retention:
#   time_travel_days — point-in-time query window (set on ANALYTICS_RETAIL database)
#   fail_safe_days   — Snowflake last-resort recovery (always 7 days; not configurable)
#
# Notes on configurability:
#   - Regulated clients (financial-adjacent, healthcare retail) typically extend to 7 years.
#   - Privacy-strict EU clients with age-gated content often shorten to 13 months for
#     non-essential data.
#   - All durations are in months unless noted.

version: 1

snowflake_native:
  time_travel_days: 7          # applied to ANALYTICS_RETAIL database
  fail_safe_days: 7            # Snowflake-managed; cannot be changed

retention:

  # ─── Sales ────────────────────────────────────────────────────────────────

  order_transactions:
    tables:
      - fact_orders
      - fact_order_lines
      - fact_refunds
    bronze_days: 90
    silver_months: indefinite
    gold_months: indefinite
    archive: null
    rationale: >
      Order records are the financial system of record for tax and regulatory inquiries.
      Indefinite retention is the correct default for most jurisdictions. Clients with
      specific 7-year audit requirements already satisfy that with indefinite retention.

  # ─── Customer ─────────────────────────────────────────────────────────────

  customer_profiles:
    tables:
      - dim_customer
    bronze_days: 90
    silver_months: indefinite_until_erasure
    gold_months: indefinite_until_erasure
    archive: null
    rationale: >
      Customer profiles are retained indefinitely unless a GDPR/CCPA erasure request
      is received. After erasure, the customer row persists with PII fields redacted.
      Retention policy does not override erasure — erasure takes precedence.

  customer_state_daily:
    tables:
      - fact_customer_state_daily
    bronze_months: null          # generated by dbt; no bronze layer
    silver_months: 24
    gold_months: 24
    archive:
      after_months: 24
      archive_grain: monthly
      archive_retention_months: 84     # 7 years for cohort analysis
    rationale: >
      Daily customer state snapshots accumulate large row counts. After 24 months,
      rows are compressed to monthly grain. 7-year archive window supports long-run
      cohort analysis (e.g., 3-year LTV curves).

  # ─── Marketing ────────────────────────────────────────────────────────────

  marketing_spend:
    tables:
      - fact_marketing_spend
      - dim_marketing_campaign
    bronze_days: 90
    silver_months: indefinite
    gold_months: indefinite
    archive: null
    rationale: >
      Ad spend is financial data needed for CAC and ROAS trend analysis over time.
      Indefinite retention is appropriate.

  web_sessions:
    tables:
      - fact_web_sessions
    bronze_days: 30
    silver_months: 24
    gold_months: 24
    archive:
      after_months: 24
      archive_grain: monthly
      archive_retention_months: 60     # 5 years
    rationale: >
      Session-level data degrades in analytical value beyond 2 years for most purposes.
      Older sessions are aggregated to monthly grain. GA4's own 14-month retention
      means bronze is effectively limited to 14 months regardless of this setting.

  # ─── Email/CRM ────────────────────────────────────────────────────────────

  email_engagement:
    tables:
      - fact_email_engagement
      - dim_email_campaign
    bronze_days: 90
    silver_months: 24
    gold_months: 24
    archive:
      after_months: 24
      archive_grain: monthly
      archive_retention_months: 60     # 5 years
    rationale: >
      Email events are most valuable for recent engagement and retention analysis.
      Older events are aggregated. Note that if a customer requests erasure, their
      email engagement rows are also redacted regardless of this retention window.

  # ─── Inventory ────────────────────────────────────────────────────────────

  inventory_snapshots:
    tables:
      - fact_inventory_snapshot
    bronze_days: 30
    silver_months: 24
    gold_months: 24
    archive:
      after_months: 24
      archive_grain: monthly
      archive_retention_months: 60     # 5 years for trend analysis
    rationale: >
      Daily inventory snapshots accumulate quickly at high SKU counts. After 24 months,
      snapshots are compressed to monthly grain. Monthly archive supports multi-year
      trend analysis for seasonality and turns benchmarking.

  inventory_movements:
    tables:
      - fact_inventory_movements
    bronze_days: 30
    silver_months: 24
    gold_months: 24
    archive:
      after_months: 24
      archive_grain: monthly
      archive_retention_months: 60
    rationale: >
      Movement records support sell-through cohort analysis in v2. Same archival
      schedule as snapshots for operational simplicity.

  # ─── Audit / Metadata ─────────────────────────────────────────────────────

  audit_logs:
    tables:
      - metadata.dbt_run_log
      - metadata.erasure_log
      - metadata.lineage_edges
    bronze_months: null          # lives in metadata schema; no bronze
    silver_months: 12            # active hot retention
    gold_months: null            # no gold mart for audit logs
    archive:
      after_months: 12
      archive_grain: full_row    # audit rows must not be downsampled
      archive_retention_months: 60     # 5 years
    rationale: >
      Per §8.9 and regulatory best practice: 12 months active, 5 years archived.
      Erasure log rows must be retained even after the customer is erased —
      the log proves the erasure happened. Archive must retain full-row grain
      (no downsampling) to preserve audit integrity.

  # ─── Snowflake account-level logs ─────────────────────────────────────────

  snowflake_access_history:
    source: "SNOWFLAKE.ACCOUNT_USAGE.ACCESS_HISTORY"
    retention_months: 12           # Snowflake default; plan-dependent
    note: >
      Managed by Snowflake. Retain at least 12 months per §8.6. Enterprise plan
      clients may extend via Snowflake support. Not controlled by this pack.

  snowflake_query_history:
    source: "SNOWFLAKE.ACCOUNT_USAGE.QUERY_HISTORY"
    retention_months: 12
    note: Managed by Snowflake. Same retention as ACCESS_HISTORY.

  snowflake_login_history:
    source: "SNOWFLAKE.ACCOUNT_USAGE.LOGIN_HISTORY"
    retention_months: 12
    note: Managed by Snowflake.

# ─── Retention vs. erasure interaction note ───────────────────────────────────
#
# Retention is time-based and automatic.
# Erasure is event-driven and on request (GDPR Art. 17 / CCPA).
# A customer exercising erasure rights has their PII deleted regardless of the
# retention window above. The customer row itself persists (for analytical integrity)
# but with all PII fields cryptographically redacted.
# See 06_governance/erasure_runbook.md for the full procedure.
