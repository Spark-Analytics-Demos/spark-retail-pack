# =============================================================================
# expected_values.yml — Known correct KPI values for CI validation
# Per §9.9: these values are committed after running the Medium tier generator
# (seed=42) and confirming outputs are correct. CI runs dbt against this data
# and fails if any KPI deviates beyond its tolerance.
#
# Status: TEMPLATE — run `python generators/main.py --tier medium` to populate
# the metrics section with actual values, then commit those numbers here.
#
# Tolerances:
#   Absolute counts and amounts:  ±0    (exact match required)
#   Ratio metrics (rates, %):     ±0.5% relative
# =============================================================================

year: 2026
tier: medium
seed: 42

# Populated after first successful Medium tier generation + dbt run.
# Values below are representative targets from §9.9 design doc.
# Replace with generator-computed values before enabling CI validation.

