# Klaviyo flows (automated)
klaviyo_flows:
  - id: "FL001"
    name: "Welcome Series"
    status: "live"
    trigger: "new_subscriber"
    emails:
      - day: 0
        subject: "Welcome to Northwind Co. — Here's 10% Off"
      - day: 3
        subject: "Our Most-Loved Pieces Right Now"
      - day: 7
        subject: "The Northwind Story"

  - id: "FL002"
    name: "Abandoned Cart"
    status: "live"
    trigger: "cart_abandoned"
    emails:
      - hour: 1
        subject: "You left something behind"
      - hour: 24
        subject: "Still thinking it over? Here's 5% off"
      - hour: 72
        subject: "Last chance — your cart is expiring"

  - id: "FL003"
    name: "Post-Purchase"
    status: "live"
    trigger: "order_placed"
    emails:
      - day: 3
        subject: "Your order is on its way!"
      - day: 14
        subject: "How do you like your purchase?"
      - day: 30
        subject: "Complete the look"

  - id: "FL004"
    name: "Win-Back - 90 Day Lapsed"
    status: "live"
    trigger: "90_days_no_purchase"
    emails:
      - day: 0
        subject: "We miss you, {first_name}"
      - day: 7
        subject: "Here's 15% off — just for you"

  - id: "FL005"
    name: "Browse Abandonment"
    status: "live"
    trigger: "product_viewed_no_purchase"
    emails:
      - hour: 4
        subject: "Still eyeing the {product_name}?"

