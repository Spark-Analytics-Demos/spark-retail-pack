# Metric synonym mappings for natural-language query resolution.
# Per §7.13: consumed by the Spark AI assistant to resolve informal or abbreviated
# metric names to their canonical MetricFlow metric names.
#
# When a user types "What's our CAC for Facebook last month?", the AI resolves:
#   "CAC" → cac_by_channel
#   "Facebook" → channel = paid_social_meta
#
# Terms should cover: abbreviations, informal names, misspellings, domain jargon,
# and common alternative definitions the user might mean. The AI ranks candidates
# by term frequency and selects the best match using the canonical kpi_id + module.

